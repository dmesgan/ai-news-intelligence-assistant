services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ainews
      POSTGRES_USER: ${DB_USERNAME:-ainews}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ainews}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ainews} -d ainews"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/ainews
      DB_USERNAME: ${DB_USERNAME:-ainews}
      DB_PASSWORD: ${DB_PASSWORD:-ainews}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
